name: Deploy to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wakeelfrontend

    steps:
      - name: Validate required secrets
        run: |
          missing=0
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error::Missing secret VERCEL_TOKEN — GitHub → Settings → Secrets and variables → Actions → New repository secret"
            missing=1
          fi
          if [ -z "$VERCEL_ORG_ID" ]; then
            echo "::error::Missing secret VERCEL_ORG_ID — Vercel → solid-system → Settings → General → Team ID"
            missing=1
          fi
          if [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "::error::Missing secret VERCEL_PROJECT_ID — Vercel → solid-system → Settings → General → Project ID"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: wakeelfrontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (Create React App)
        run: npm run build
        env:
          CI: true
          REACT_APP_API_URL: https://api-solid.execute-iq.com/wakeel/api

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy build folder to Vercel
        run: vercel deploy ./build --prod --yes --token="$VERCEL_TOKEN"
